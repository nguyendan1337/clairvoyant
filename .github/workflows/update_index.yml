name: Run recommenders and update page

# Trigger workflow on weekdays at 7 AM (local time) + manual trigger
on:
  schedule:
    - cron: '0 21 * * *' # 1 PM PST, 2 PM PDT Daily After Market Close
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-html:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore caches
        uses: actions/cache/restore@v4
        id: cache-restore
        with:
          path: |
            yf_cache.json
            stock_pages_cache.json
          key: qvm-cache-${{ github.ref }}-${{ github.sha }}     # primary key (unique per commit)
          restore-keys: |
            qvm-cache-${{ github.ref }}-                         # fallback to latest on same branch

      # Step 4: Run scripts
      - name: Run ETF Recommender
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
        run: python etf_recommender.py
      - name: Run Stock Recommender
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
        run: python stock_recommender.py

      - name: Save caches for future runs
        uses: actions/cache/save@v4
        if: always()                     # save even if previous steps failed
        with:
          path: |
            yf_cache.json
            stock_pages_cache.json
          key: qvm-cache-${{ github.ref }}-${{ github.sha }}

      # Step 5: Commit + push outputs and caches
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Ensure cache files exist
          touch yf_cache.json stock_pages_cache.json

          git add index.html etf_index.html yf_cache.json stock_pages_cache.json

          git commit -m "Update HTML files and caches via GitHub Actions" || echo "No changes to commit"

          git pull --rebase
          git push
